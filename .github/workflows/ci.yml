name: WATCH CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: watch-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Prepare proof directory
        run: mkdir -p artifacts

      - name: Lint
        shell: bash
        run: |
          set +e
          python -m ruff check . --output-format=concise 2>&1 | tee artifacts/ruff.txt
          status=${PIPESTATUS[0]}
          exit $status

      - name: Type check
        shell: bash
        run: |
          set +e
          python -m mypy src 2>&1 | tee artifacts/mypy.txt
          status=${PIPESTATUS[0]}
          exit $status

      - name: Tests
        run: python -m pytest --junitxml=artifacts/test-results.xml

      - name: V1 readiness audit
        run: |
          python scripts/build-readiness-report.py \
            --root . \
            --json-out artifacts/v1-readiness.json \
            --markdown-out artifacts/v1-readiness.md

      - name: Demo proof
        run: python -m watch.cli demo --workspace artifacts/demo

      - name: Verification summary
        if: always()
        run: |
          {
            echo "# WATCH Linux verification"
            echo
            echo "- Commit: $GITHUB_SHA"
            echo "- Workflow: $GITHUB_WORKFLOW"
            echo "- Run: $GITHUB_RUN_ID"
            echo "- Result: ${{ job.status }}"
          } > artifacts/verification-summary.md

      - name: Upload Linux proof artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watch-linux-proof-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

  visual-proof:
    needs: linux-verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install WATCH and Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m playwright install --with-deps chromium

      - name: Prepare deterministic UI workspace
        run: |
          mkdir -p artifacts/ui
          python scripts/prepare-ui-demo.py --workspace artifacts/ui/workspace

      - name: Start WATCH workbench
        env:
          WATCH_WORKSPACE: ${{ github.workspace }}/artifacts/ui/workspace
        run: |
          python -m uvicorn watch.webapp:app --host 127.0.0.1 --port 8000 \
            > artifacts/ui/server.log 2>&1 &
          echo $! > artifacts/ui/server.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/api/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat artifacts/ui/server.log
          exit 1

      - name: Run Playwright semantic and screenshot proof
        run: |
          python scripts/verify-ui.py \
            --base-url http://127.0.0.1:8000 \
            --artifacts artifacts/ui

      - name: Visual proof summary
        if: always()
        run: |
          {
            echo "# WATCH browser verification"
            echo
            echo "- Commit: $GITHUB_SHA"
            echo "- Workflow: $GITHUB_WORKFLOW"
            echo "- Run: $GITHUB_RUN_ID"
            echo "- Result: ${{ job.status }}"
            echo "- Browser: Chromium"
          } > artifacts/ui/verification-summary.md

      - name: Upload visual proof artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watch-visual-proof-${{ github.run_number }}
          path: artifacts/ui/
          if-no-files-found: error
          retention-days: 30

  windows-operator-workflow:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Windows dependencies
        shell: pwsh
        run: python -m pip install --disable-pip-version-check --no-input -e ".[dev]"

      - name: Windows lint
        shell: pwsh
        run: python -m ruff check .

      - name: Windows type check
        shell: pwsh
        run: python -m mypy src

      - name: Windows tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          python -m pytest --junitxml=artifacts\test-results.xml

      - name: V1 readiness audit
        shell: pwsh
        run: |
          python scripts\build-readiness-report.py `
            --root . `
            --json-out artifacts\v1-readiness.json `
            --markdown-out artifacts\v1-readiness.md

      - name: Run WATCH demo
        shell: pwsh
        run: .\WATCH.ps1 demo

      - name: Export preverified review package
        shell: pwsh
        run: .\scripts\export-review.ps1 -SkipVerification

      - name: Collect Windows proof
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          if (Test-Path .watch-data) {
            Copy-Item .watch-data -Destination artifacts\demo -Recurse -Force
          }
          Get-ChildItem $HOME\Downloads\WATCH_REVIEW_*.zip -ErrorAction SilentlyContinue |
            Copy-Item -Destination artifacts -Force
          @"
          # WATCH Windows operator verification

          - Commit: $env:GITHUB_SHA
          - Workflow: $env:GITHUB_WORKFLOW
          - Run: $env:GITHUB_RUN_ID
          - Result: ${{ job.status }}
          "@ | Set-Content artifacts\verification-summary.md -Encoding UTF8

      - name: Upload Windows proof artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watch-windows-proof-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

  clean-checkout-windows:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout clean repository
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Confirm clean operator state
        shell: pwsh
        run: |
          if (Test-Path .venv) { throw "Clean checkout unexpectedly contains .venv." }
          if (Test-Path .watch-data) { throw "Clean checkout unexpectedly contains .watch-data." }
          New-Item -ItemType Directory -Path artifacts\clean-checkout -Force | Out-Null

      - name: Run documented setup
        shell: pwsh
        run: .\WATCH.ps1 setup

      - name: Run documented verification
        shell: pwsh
        run: .\WATCH.ps1 verify

      - name: Run documented demo
        shell: pwsh
        run: .\WATCH.ps1 demo

      - name: Exercise no-network operator commands
        shell: pwsh
        run: |
          $Workspace = Join-Path $PWD "artifacts\clean-checkout\empty-workspace"
          .\WATCH.ps1 plan `
            -EvaluatedAt "2026-07-14T10:20:00Z" `
            -Workspace $Workspace `
            -OutputPath "artifacts\clean-checkout\due-plan.json" | Out-Null
          .\WATCH.ps1 run-once `
            -EvaluatedAt "2026-07-14T10:20:00Z" `
            -MaxWork 1 `
            -Workspace $Workspace `
            -OutputPath "artifacts\clean-checkout\due-run.json" | Out-Null
          .\WATCH.ps1 task-plan `
            -TaskName "WATCH-Clean-Checkout-Proof" `
            -IntervalMinutes 30 `
            -MaxWork 1 `
            -Workspace $Workspace `
            -EvidenceDirectory "artifacts\clean-checkout\scheduled-evidence" `
            -StatePath "artifacts\clean-checkout\scheduler-state.json" `
            -OutputPath "artifacts\clean-checkout\task-plan.json" | Out-Null

      - name: Build clean-checkout readiness evidence
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe scripts\build-readiness-report.py `
            --root . `
            --json-out artifacts\clean-checkout\v1-readiness.json `
            --markdown-out artifacts\clean-checkout\v1-readiness.md
          @"
          # WATCH clean-checkout operator proof

          - Commit: $env:GITHUB_SHA
          - Setup: PASS
          - Verify: PASS
          - Demo: PASS
          - Plan: PASS
          - Run once: PASS
          - Task plan: PASS
          - Persistent task installed: false
          - Live network check performed: false
          "@ | Set-Content artifacts\clean-checkout\summary.md -Encoding UTF8

      - name: Upload clean-checkout proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watch-clean-checkout-proof-${{ github.run_number }}
          path: artifacts/clean-checkout/
          if-no-files-found: error
          retention-days: 30
